// Pre-compute current UTC offset string for searching by "GMT-5", "UTC+1" etc.
function getCurrentOffsetString(tz) {
  try {
    const fmt = new Intl.DateTimeFormat('en-US', { timeZone: tz, timeZoneName: 'longOffset', hour: '2-digit' });
    const parts = fmt.formatToParts(new Date());
    const tzn = parts.find(p => p.type === 'timeZoneName')?.value || '';
    // tzn looks like "GMT-05:00" or "GMT"
    return tzn.replace(/^GMT/, '');
  } catch { return ''; }
}

// Search index. Tokens are lowercased haystack strings keyed by city id.
function buildSearchHaystack(c) {
  const off = getCurrentOffsetString(c.tz);
  const offNum = off.match(/-?\d+/)?.[0] || '';
  return [
    c.city, c.country, c.countryEs, c.tz,
    `gmt${off}`, `utc${off}`,
    offNum ? `gmt${offNum >= 0 ? '+' : ''}${offNum}` : '',
    offNum ? `utc${offNum >= 0 ? '+' : ''}${offNum}` : '',
    ...(c.aliases || []),
    ...(c.tags || []),
    CONTINENTS.find(k => k.id === c.continent)?.label || '',
  ].join(' ').toLowerCase();
}

const SEARCH_INDEX = Object.fromEntries(CITIES.map(c => [c.id, buildSearchHaystack(c)]));

function searchCities(query, continent = 'all') {
  const q = (query || '').trim().toLowerCase();
  let pool = CITIES;
  if (continent && continent !== 'all') pool = pool.filter(c => c.continent === continent);
  if (!q) return pool;
  // Tokenize search; require all tokens match.
  const tokens = q.split(/\s+/).filter(Boolean);
  return pool.filter(c => {
    const hay = SEARCH_INDEX[c.id];
    return tokens.every(t => hay.includes(t));
  });
}

window.CITY_DB = { CITIES, CONTINENTS, TAG_META, searchCities, getCurrentOffsetString };

// Get the parts of a Date in a given IANA timezone.
function getZonedParts(date, tz) {
  const fmt = new Intl.DateTimeFormat('en-US', {
    timeZone: tz,
    hour12: false,
    year: 'numeric', month: '2-digit', day: '2-digit',
    hour: '2-digit', minute: '2-digit', second: '2-digit',
    weekday: 'short',
  });

    if (p.type !== 'literal') acc[p.type] = p.value;
    return acc;
  }, {});

    year: +parts.year,
    month: +parts.month,
    day: +parts.day,
    hour: +parts.hour === 24 ? 0 : +parts.hour,
    minute: +parts.minute,
    second: +parts.second,
    weekday: parts.weekday,
  };
}

// Build a UTC Date from a wall-clock time stated to be in `tz`.
// Iterative method: compute zoned offset for the candidate UTC, refine.
function zonedTimeToUTC(year, month, day, hour, minute, tz) {

  let utc = Date.UTC(year, month - 1, day, hour, minute, 0);

    const parts = getZonedParts(new Date(utc), tz);
    const asUTCofParts = Date.UTC(parts.year, parts.month - 1, parts.day, parts.hour, parts.minute, parts.second);
    const diff = asUTCofParts - utc; // = offset of tz at that moment
    const target = Date.UTC(year, month - 1, day, hour, minute, 0);
    utc = target - diff;
  }

}

// Get tz abbreviation (e.g. "EST") and offset string ("UTC-5") at a given moment.
function getTZAbbrAndOffset(date, tz) {

  const longParts = longFmt.formatToParts(date);
  const tzName = longParts.find(p => p.type === 'timeZoneName')?.value || tz;

  const parts = getZonedParts(date, tz);

  const offsetMin = Math.round((asUTC - date.getTime()) / 60000);
  const sign = offsetMin >= 0 ? '+' : '−';
  const abs = Math.abs(offsetMin);

function categorizeHour(hour, workStart, workEnd) {
  if (hour >= workStart && hour < workEnd) return 'work';        // green
  if (hour === workStart - 1 || hour === workEnd) return 'edge'; // yellow (just outside)
  if (hour >= 6 && hour < workStart - 1) return 'morning';       // yellow-ish — early but awake

      for (const c of rows) {
        const cp = window.TZ.getZonedParts(utc, c.tz);
        const cat = window.TZ.categorizeHour(cp.hour, state.workStart, state.workEnd);
        if (cat === 'work') inWork += 1;
        else if (['edge', 'morning', 'evening'].includes(cat)) edge += 1;
      }
      tally.push({ hour: h, inWork, edge });
    }
    return tally.sort((a, b) => b.inWork - a.inWork || b.edge - a.edge || a.hour - b.hour);
  }
  function renderHourStrip(c, base, baseParts) {
    const cells = [];
    for (let h = 0; h < 24; h += 1) {
      const utc = window.TZ.zonedTimeToUTC(baseParts.year, baseParts.month, baseParts.day, h, 0, base.tz);
      const parts = window.TZ.getZonedParts(utc, c.tz);
      const status = window.TZ.categorizeHour(parts.hour, state.workStart, state.workEnd);
      cells.push(el('span', { class: `hour-cell hour-${status} ${h === baseParts.hour ? 'hour-current' : ''}`, title: `${pad(h)}:00 ${base.city} = ${pad(parts.hour)}:00 ${c.city}`, text: pad(parts.hour) }));
    }
    return el('article', { class: 'strip-card' },
      el('div', { class: 'strip-head' }, el('div', { class: 'city-line' }, el('span', { class: 'flag', text: c.flag }), el('span', { text: c.city })), el('span', { class: 'muted', text: `${c.abbr} ${c.offset}` })),
      el('div', { class: 'hours' }, cells)
    );
  }

  function renderFavorites() {
    return el('div', null,
      el('section', { class: 'hero' },
        el('div', null, el('h1', { text: 'Favorites' }), el('p', { text: 'Save frequent groups of cities. Names are cleaned before being stored locally.' })),
        button('New group from current', { icon: '＋', onclick: () => { newGroupName = ''; editingFavId = '__new__'; render(); } })
      ),
      editingFavId === '__new__' ? renderNewGroupPanel() : null,
      el('section', { class: 'fav-grid' }, state.favorites.map(renderFavoriteCard))
    );
  }
  function renderNewGroupPanel() {
    return el('section', { class: 'panel' },
      el('div', { class: 'panel-head' }, el('div', null, el('div', { class: 'panel-title', text: 'New favorite group' }), el('div', { class: 'panel-sub', text: `Save current selection of ${state.selected.length} cities.` }))),
      el('div', { class: 'input-row' },
        el('input', { class: 'input', maxlength: String(MAX_NAME), value: newGroupName, placeholder: 'e.g. Q3 Marketing Sync', oninput: e => { newGroupName = String(e.target.value || '').slice(0, MAX_NAME); } }),
        button('Cancel', { variant: 'secondary', onclick: () => { editingFavId = null; render(); } }),
        button('Save group', { onclick: () => createFavorite(newGroupName), disabled: !newGroupName.trim() })
      )
    );
  }
  function createFavorite(name) {
    if (state.favorites.length >= MAX_FAVORITES) { showToast('Límite de grupos alcanzado.'); return; }
    const favorite = { id: makeId(), name: safeName(name), cities: [...state.selected].slice(0, MAX_GROUP_CITIES) };
    editingFavId = null;
    newGroupName = '';
    update({ favorites: [...state.favorites, favorite], activeFavId: favorite.id });
    showToast('Grupo guardado.');
  }
  function loadFavorite(id) {
    const f = state.favorites.find(x => x.id === id);
    if (!f) return;
    update({ selected: uniqValidCityIds(f.cities, MAX_GROUP_CITIES), activeFavId: f.id, tab: 'converter' });
    showToast(`Grupo cargado: ${f.name}.`);
  }
  function renameFavorite(id, value) {
    update({ favorites: state.favorites.map(f => f.id === id ? { ...f, name: safeName(value, f.name) } : f) });
  }
  function removeFavorite(id) {
    update({ favorites: state.favorites.filter(f => f.id !== id), activeFavId: state.activeFavId === id ? null : state.activeFavId });
  }
  function renderFavoriteCard(f) {
    return el('article', { class: 'fav-card' },
      el('div', { class: 'fav-head' },
        el('div', null, el('div', { class: 'fav-title', text: f.name }), el('div', { class: 'muted', text: `${f.cities.length} ${f.cities.length === 1 ? 'city' : 'cities'}` })),
        iconButton('×', 'Delete group', () => removeFavorite(f.id))
      ),
      el('div', { class: 'input-row' },
        el('input', { class: 'input', maxlength: String(MAX_NAME), value: f.name, 'aria-label': 'Rename group', onchange: e => renameFavorite(f.id, e.target.value) }),
        button('Load', { size: 'sm', onclick: () => loadFavorite(f.id) })
      ),
      el('div', { class: 'fav-cities' }, f.cities.map(id => {
        const c = byId(id);
        return c ? el('span', { class: 'chip' }, el('span', { text: c.flag }), el('span', { text: c.city })) : null;
      }))
    );
  }

  function renderPrivacy() {
    return el('div', null,
      el('section', { class: 'hero' }, el('div', null, el('h1', { text: 'Privacy & Security' }), el('p', { text: 'This hardened version works offline, uses no external services and gives you control over local storage.' }))),
      el('section', { class: 'panel privacy-grid' },
        el('div', null, el('div', { class: 'panel-title', text: 'Local saving' }), el('div', { class: 'panel-sub', text: 'When enabled, the app stores only your selected cities, favorite groups, working hours and last base time in this browser. No account, no cookies, no tracking.' })),
        el('div', { class: 'actions' },
          el('label', { class: 'switch-row' }, el('input', { type: 'checkbox', checked: state.persist, onchange: e => { const enabled = Boolean(e.target.checked); state.persist = enabled; if (!enabled) { localStorage.removeItem(STORAGE_KEY); localStorage.removeItem(LEGACY_STORAGE_KEY); showToast('Datos locales eliminados.'); } else { persistState(); showToast('Guardado local activado.'); } render(); } }), el('span', { text: 'Save locally' })),
          button('Clear data', { variant: 'danger', onclick: () => { localStorage.removeItem(STORAGE_KEY); localStorage.removeItem(LEGACY_STORAGE_KEY); state = { ...defaultState(), persist: false, tab: 'privacy' }; render(); showToast('Datos locales eliminados.'); } })
        )
      ),
      el('section', { class: 'notice' },
        el('strong', { text: 'Security posture: ' }),
        el('span', { text: 'No network calls, no third-party scripts, no runtime compiler, sanitized local data, strict Content Security Policy and no hidden edit/debug panel.' })
      )
    );
  }

  function render() {
    app.replaceChildren(
      renderHeader(),
      el('main', { class: 'main' }, state.tab === 'converter' ? renderConverter() : state.tab === 'planner' ? renderPlanner() : state.tab === 'favorites' ? renderFavorites() : renderPrivacy()),
      el('footer', { class: 'footer' }, 'Timezone rules are calculated with the browser Intl API. For critical meetings, still confirm with attendees because local policies can change.')
    );
  }

  window.addEventListener('keydown', event => {
    if (event.key === 'Escape' && pickerOpen) {
      pickerOpen = false;
      render();
    }
  });

  render();
})();

  </script>
</body>
